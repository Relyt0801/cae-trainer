name: Build CAE Trainer APK

on:
  push:
    branches: [main, "claude/**"]
    paths: ["app/**", ".github/workflows/flutter-apk.yml"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Scaffold platform folders
        run: flutter create --org com.tyleradams --project-name cae_trainer --platforms=android .

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cae-trainer-release-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Publish APK as a public GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v1.0.0' }}
          name: CAE Trainer v1.0.0
          body: |
            Installierbare Android-APK für den CAE Trainer.
            Auf dem Handy öffnen → „Installieren" → ggf. „Installation aus unbekannten Quellen erlauben".
          files: app/build/app/outputs/flutter-apk/app-release.apk
