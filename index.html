<style>
:root{
  --paper:#F3EAD6; --paperWarm:#ECE1C7; --paperDeep:#E3D6B3;
  --ink:#1A1612; --inkSoft:#4A4036; --inkFaint:#8A7C6C;
  --rule:#CDBFA3; --accent:#7A1A1A;
  --correct:#2F5D2A; --correctBg:#D9E4CF;
  --wrong:#8B1A1A; --wrongBg:#ECD6D6;
  --highlight:#F5D76E;
  --serif:'Cormorant Garamond', Georgia, serif;
  --body:'Lora', Georgia, serif;
  --mono:'JetBrains Mono', ui-monospace, monospace;
  --pad:22px;
  --maxw:720px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:var(--paper); color:var(--ink);
  font-family:var(--body); font-size:17px; line-height:1.55;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none;}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

/* ---------- layout shell ---------- */
#app{min-height:100%;display:flex;flex-direction:column;}
.view{flex:1;display:none;flex-direction:column;min-height:0;}
.view.active{display:flex;}
.wrap{width:100%;max-width:var(--maxw);margin:0 auto;padding-left:var(--pad);padding-right:var(--pad);}

/* ---------- eyebrow / mono labels ---------- */
.eyebrow{font-family:var(--mono);text-transform:uppercase;letter-spacing:.2em;font-size:11px;color:var(--inkFaint);}
.mono{font-family:var(--mono);letter-spacing:.15em;}

/* ---------- HOME ---------- */
.home-scroll{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;}
.home-header{
  padding-top:calc(34px + env(safe-area-inset-top));
  padding-bottom:24px;
  background-image:repeating-linear-gradient(180deg,transparent 0,transparent 27px,rgba(122,26,26,.025) 27px,rgba(122,26,26,.025) 28px);
  border-bottom:1px solid var(--rule);
}
.home-header .eyebrow{margin-bottom:10px;}
.home-title{font-family:var(--serif);font-weight:600;font-size:34px;line-height:1.05;letter-spacing:-.01em;margin:0;}
.home-title em{font-style:italic;font-weight:500;color:var(--accent);}
.home-sub{font-style:italic;color:var(--inkSoft);margin-top:10px;font-size:15px;}
.cards{padding-top:18px;padding-bottom:calc(28px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:14px;}
.card{
  display:flex;gap:16px;align-items:flex-start;text-align:left;width:100%;
  background:var(--paperWarm);border:1px solid var(--rule);padding:16px;
  transition:border-color .15s ease, transform .05s ease;
}
.card:active{transform:translateY(1px);}
.card:hover{border-color:var(--ink);}
.card-icon{flex:none;width:48px;height:48px;background:var(--ink);color:var(--paper);
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;letter-spacing:.06em;}
.card-main{flex:1;min-width:0;}
.card-meta,.card-name,.card-desc,.card-progress{display:block;}
.card-meta{font-family:var(--mono);font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--inkFaint);}
.card-name{font-family:var(--serif);font-weight:600;font-size:21px;line-height:1.15;margin:3px 0 4px;}
.card-desc{font-size:14px;color:var(--inkSoft);line-height:1.4;}
.card-chevron{flex:none;align-self:center;font-size:22px;color:var(--inkFaint);}

/* card progress (Führerschein-Stil: Balken + 60%-Marke) */
.card-progress{margin-top:18px;}
.cp-bar{display:block;position:relative;height:12px;background:var(--paperDeep);border:1px solid var(--rule);overflow:visible;}
.cp-fill{position:absolute;left:0;top:0;bottom:0;width:0;transition:width .5s ease;}
.cp-fill.pass{background:var(--correct);}
.cp-fill.fail{background:var(--wrong);}
.cp-fill.none{background:transparent;}
.cp-mark{position:absolute;top:-3px;bottom:-3px;left:60%;width:2px;background:var(--ink);}
.cp-mark::after{content:"60";position:absolute;top:-13px;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:8.5px;letter-spacing:.06em;color:var(--ink);}
.cp-labels{display:flex;justify-content:space-between;align-items:baseline;margin-top:9px;}
.cp-pct{font-family:var(--mono);font-size:13px;letter-spacing:.06em;}
.cp-pct.pass{color:var(--correct);} .cp-pct.fail{color:var(--wrong);} .cp-pct.none{color:var(--inkFaint);}
.cp-status{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--inkFaint);}

/* install */
.install-area{margin-top:18px;}
.install-btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;
  letter-spacing:.14em;text-transform:uppercase;padding:11px 16px;background:var(--ink);color:var(--paper);border:1px solid var(--ink);}
.install-btn:active{transform:translateY(1px);}
.install-hint{margin-top:10px;font-size:13.5px;line-height:1.5;color:var(--inkSoft);
  background:var(--paperWarm);border:1px solid var(--rule);border-left:3px solid var(--accent);padding:11px 13px;}
.install-hint b{color:var(--ink);}

/* ---------- topbar (quiz/results) ---------- */
.topbar{
  padding-top:calc(12px + env(safe-area-inset-top));padding-bottom:12px;
  border-bottom:1px solid var(--rule);background:var(--paper);
  background-image:repeating-linear-gradient(180deg,transparent 0,transparent 27px,rgba(122,26,26,.025) 27px,rgba(122,26,26,.025) 28px);
}
.topbar-row{display:flex;align-items:flex-start;gap:14px;}
.icon-btn{flex:none;width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  font-size:24px;line-height:1;color:var(--inkSoft);border:1px solid var(--rule);background:var(--paperWarm);}
.icon-btn:active{background:var(--paperDeep);}
.topbar-titles{flex:1;min-width:0;}
.topbar-titles .row1{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
.topbar-cat{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);}
.topbar-count{font-family:var(--mono);font-size:12px;letter-spacing:.1em;color:var(--inkSoft);}
.topbar-name{font-family:var(--serif);font-weight:600;font-size:18px;line-height:1.1;margin-top:1px;}
.ticks{display:flex;gap:4px;margin-top:11px;}
.tick{flex:1;height:4px;background:var(--paperDeep);}
.tick.done{background:var(--inkFaint);}
.tick.cur{background:var(--accent);}

/* ---------- quiz body ---------- */
.quiz-body{flex:1;display:flex;flex-direction:column;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.passage-pane{
  background:var(--paperWarm);border-bottom:1px solid var(--rule);
  max-height:32vh;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:none;
}
.passage-pane .wrap{padding-top:16px;padding-bottom:18px;}
.passage-title{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--inkFaint);margin-bottom:10px;}
.passage-text{font-size:16px;line-height:1.85;color:var(--inkSoft);}
.gap{font-family:var(--mono);font-size:.82em;letter-spacing:.04em;padding:1px 7px;border:1px solid var(--rule);
  background:var(--paperDeep);color:var(--inkSoft);white-space:nowrap;border-radius:0;}
.gap.answered{background:var(--correctBg);border-color:#A9C29C;color:var(--correct);}
.gap.active{background:var(--highlight);border-color:#D9B84A;color:var(--ink);
  animation:glow 1.6s ease-in-out infinite;}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(245,215,110,.0);}50%{box-shadow:0 0 0 4px rgba(245,215,110,.45);}}

.qbody{flex:1;}
.qbody .wrap{padding-top:18px;padding-bottom:22px;}
.q-eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--inkFaint);margin-bottom:12px;}
.q-prompt{font-family:var(--serif);font-weight:600;font-size:23px;line-height:1.2;margin-bottom:18px;}
.q-prompt b{color:var(--accent);font-style:italic;font-weight:600;}

/* MC options */
.options{display:flex;flex-direction:column;gap:10px;}
.option{display:flex;align-items:center;gap:13px;text-align:left;width:100%;
  background:var(--paperWarm);border:1px solid var(--rule);padding:14px 15px;min-height:52px;
  transition:border-color .12s ease,background .12s ease;}
.option:hover{border-color:var(--inkFaint);}
.option.sel{border-color:var(--ink);background:var(--paperDeep);}
.option .marker{flex:none;width:22px;height:22px;border:1.5px solid var(--inkFaint);border-radius:50%;
  display:flex;align-items:center;justify-content:center;}
.option.sel .marker{border-color:var(--ink);}
.option.sel .marker::after{content:"";width:10px;height:10px;border-radius:50%;background:var(--ink);}
.option .lett{font-family:var(--mono);font-size:13px;color:var(--inkFaint);min-width:14px;}
.option.sel .lett{color:var(--ink);}
.option .txt{font-size:17px;}

/* text input area */
.hint{font-size:13px;color:var(--inkFaint);font-style:italic;margin-bottom:12px;}
.basework{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.base-tag{font-family:var(--mono);font-size:13px;letter-spacing:.12em;background:var(--ink);color:var(--paper);padding:7px 12px;}
.arrow{font-size:20px;color:var(--inkFaint);}
.answer-input{width:100%;font-family:var(--body);font-size:18px;color:var(--ink);
  background:var(--paperWarm);border:1px solid var(--rule);border-bottom:2px solid var(--inkFaint);
  padding:13px 14px;border-radius:0;}
.answer-input:focus{outline:none;border-bottom-color:var(--accent);background:#fff8ea;}
.answer-input::placeholder{color:var(--inkFaint);}

/* transformation block */
.tblock{display:flex;flex-direction:column;gap:14px;margin-bottom:16px;}
.tline{font-size:16px;line-height:1.5;}
.tlabel{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--inkFaint);display:block;margin-bottom:4px;}
.torig{color:var(--inkSoft);}
.tkey{font-family:var(--mono);font-size:14px;letter-spacing:.14em;background:var(--ink);color:var(--paper);padding:7px 13px;display:inline-block;}
.tgapped{font-size:17px;line-height:1.6;color:var(--ink);}
.tgap-mark{font-family:var(--mono);font-size:.78em;letter-spacing:.05em;background:var(--highlight);border:1px solid #D9B84A;padding:1px 8px;color:var(--ink);white-space:nowrap;}

/* ---------- navbar ---------- */
.navbar{display:flex;gap:12px;border-top:1px solid var(--rule);background:var(--paper);
  padding:14px var(--pad) calc(14px + env(safe-area-inset-bottom));}
.nav-btn{flex:1;min-height:50px;display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;
  border:1px solid var(--ink);background:var(--paperWarm);}
.nav-btn:active{transform:translateY(1px);}
.nav-btn.primary{background:var(--ink);color:var(--paper);}
.nav-btn.primary:disabled,.nav-btn:disabled{opacity:.34;cursor:not-allowed;background:var(--paperWarm);color:var(--inkFaint);border-color:var(--rule);transform:none;}
.nav-btn.primary:disabled{background:var(--paperWarm);}

/* ---------- RESULTS ---------- */
.results-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.res-hero{text-align:center;padding-top:30px;padding-bottom:26px;border-bottom:1px solid var(--rule);
  background-image:repeating-linear-gradient(180deg,transparent 0,transparent 27px,rgba(122,26,26,.025) 27px,rgba(122,26,26,.025) 28px);}
.res-hero .eyebrow{margin-bottom:6px;}
.res-hero h2{font-family:var(--serif);font-weight:600;font-size:27px;margin:0 0 18px;}
.score-box{display:inline-flex;flex-direction:column;align-items:center;border:2px solid;padding:16px 30px;margin-bottom:20px;}
.score-box.pass{border-color:var(--correct);color:var(--correct);background:var(--correctBg);}
.score-box.fail{border-color:var(--wrong);color:var(--wrong);background:var(--wrongBg);}
.score-num{font-family:var(--serif);font-weight:600;font-size:46px;line-height:1;}
.score-pct{font-family:var(--mono);font-size:12px;letter-spacing:.12em;margin-top:6px;}
.passbar-wrap{max-width:420px;margin:0 auto 18px;}
.passbar{position:relative;height:14px;background:var(--paperDeep);border:1px solid var(--rule);}
.passbar-fill{position:absolute;left:0;top:0;bottom:0;}
.passbar-fill.pass{background:var(--correct);}
.passbar-fill.fail{background:var(--wrong);}
.passbar-mark{position:absolute;top:-4px;bottom:-4px;left:60%;width:2px;background:var(--ink);}
.passbar-labels{display:flex;justify-content:space-between;margin-top:6px;font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--inkFaint);}
.grade-badge{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:8px 14px;border:1px solid;margin-bottom:12px;}
.grade-badge.pass{color:var(--correct);border-color:var(--correct);background:var(--correctBg);}
.grade-badge.fail{color:var(--wrong);border-color:var(--wrong);background:var(--wrongBg);}
.verdict{font-style:italic;color:var(--inkSoft);max-width:460px;margin:0 auto;font-size:15px;}

.review{padding-top:22px;padding-bottom:24px;}
.review-head{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--inkFaint);
  padding-bottom:10px;border-bottom:1px solid var(--rule);margin-bottom:4px;}
.rev-item{padding:16px 0;border-bottom:1px solid var(--rule);}
.rev-top{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.rev-num{font-family:var(--mono);font-size:13px;color:var(--inkFaint);min-width:22px;}
.rev-flag{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;padding:3px 9px;}
.rev-flag.ok{color:var(--correct);background:var(--correctBg);border:1px solid #A9C29C;}
.rev-flag.no{color:var(--wrong);background:var(--wrongBg);border:1px solid #D9AFAF;}
.rev-where{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--inkFaint);margin-bottom:6px;}
.rev-ans{font-size:15px;line-height:1.5;margin-bottom:4px;}
.rev-ans .you{color:var(--wrong);}
.rev-ans .you s{text-decoration:line-through;text-decoration-color:var(--wrong);}
.rev-ans .right{color:var(--correct);font-weight:500;}
.rev-exp{font-size:14px;color:var(--inkSoft);font-style:italic;line-height:1.45;margin-top:3px;}

/* ---------- modal ---------- */
.modal-back{position:fixed;inset:0;background:rgba(26,22,18,.5);display:none;align-items:center;justify-content:center;padding:24px;z-index:50;}
.modal-back.show{display:flex;}
.modal{background:var(--paper);border:1px solid var(--ink);max-width:360px;width:100%;padding:24px;}
.modal h3{font-family:var(--serif);font-weight:600;font-size:22px;margin:0 0 8px;}
.modal p{font-size:15px;color:var(--inkSoft);margin:0 0 20px;}
.modal-actions{display:flex;gap:10px;}
.modal-actions .nav-btn{flex:1;}

/* ---------- tablet ---------- */
@media (min-width:600px){
  :root{--pad:32px;}
  body{font-size:18px;}
  .home-header{padding-top:calc(46px + env(safe-area-inset-top));}
  .home-title{font-size:44px;}
  .card{padding:22px;}
  .card-icon{width:56px;height:56px;font-size:15px;}
  .card-name{font-size:24px;}
  .options{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .q-prompt{font-size:26px;}
  .passage-pane{max-height:40vh;}
  .passage-text{font-size:17.5px;}
}
@media (min-width:600px) and (orientation:landscape){
  .passage-pane{max-height:38vh;}
}
@media (max-width:599px) and (orientation:landscape){
  .passage-pane{max-height:42vh;}
}
@media (prefers-reduced-motion:reduce){
  .gap.active{animation:none;box-shadow:0 0 0 3px rgba(245,215,110,.4);}
}
</style>
</head>
<body>
<div id="app">

  <!-- ============ HOME ============ -->
  <section id="view-home" class="view active">
    <div class="home-scroll">
      <header class="home-header">
        <div class="wrap">
          <div class="eyebrow">Cambridge C1 Advanced</div>
          <h1 class="home-title">Reading &amp; <em>Use of English</em></h1>
          <p class="home-sub">Übungs-Trainer · Bestehen ab 60&nbsp;%</p>
          <div class="install-area" id="install-area" hidden>
            <button class="install-btn" id="install-btn">⤓ Als App installieren</button>
            <p class="install-hint" id="install-hint" hidden></p>
          </div>
        </div>
      </header>
      <div class="wrap">
        <div id="cards" class="cards"></div>
      </div>
    </div>
  </section>

  <!-- ============ QUIZ ============ -->
  <section id="view-quiz" class="view">
    <div class="topbar">
      <div class="wrap">
        <div class="topbar-row">
          <button class="icon-btn" id="q-close" aria-label="Test abbrechen">×</button>
          <div class="topbar-titles">
            <div class="row1">
              <span class="topbar-cat" id="q-cat">Part 1</span>
              <span class="topbar-count" id="q-count">1/8</span>
            </div>
            <div class="topbar-name" id="q-name">Multiple-Choice Cloze</div>
          </div>
        </div>
        <div class="ticks" id="q-ticks"></div>
      </div>
    </div>

    <div class="quiz-body" id="quiz-body">
      <div class="passage-pane" id="passage-pane">
        <div class="wrap">
          <div class="passage-title" id="passage-title"></div>

<script>
/* CAE Trainer — App-Logik (Vanilla JS).
   Views: home / quiz / results. State via einfache Module-Variablen. */

'use strict';

const PASS_THRESHOLD = 0.6;
const STORE_KEY = 'cae_trainer_scores_v1';

/* ---------------- Persistenz ---------------- */
function loadScores() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch (_) { return {}; }
}
function saveScore(catId, pct, passed) {
  const all = loadScores();
  const prev = all[catId] || {};
  const prevBest = prev.best != null ? prev.best : (prev.pct || 0);
  const best = Math.max(prevBest, pct);
  all[catId] = { pct, passed, when: Date.now(), best, attempts: (prev.attempts || 0) + 1 };
  try { localStorage.setItem(STORE_KEY, JSON.stringify(all)); } catch (_) {}
}

/* ---------------- Helpers ---------------- */
const $ = (sel, root = document) => root.querySelector(sel);
const cat = id => DATA.categories.find(c => c.id === id);
function poolSize(c) {
  return c.passages ? c.passages.reduce((n, p) => n + p.questions.length, 0) : c.pool.length;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ---------------- Bewertung ---------------- */
function normalize(s) {
  return String(s)
    .toLowerCase()
    .replace(/[‘’‚‛′‵]/g, "'") // smart single quotes → '
    .replace(/[“”″]/g, '"')
    .trim()
    .replace(/\s+/g, ' ');
}
function isCorrect(q, answer) {
  if (q.type === 'mc') return answer === q.correct;
  if (answer == null || String(answer).trim() === '') return false;
  const n = normalize(answer);
  return q.accept.some(acc => normalize(acc) === n);
}

/* ---------------- Session ---------------- */
let session = null;

function buildSession(catId) {
  const c = cat(catId);
  let passage = null, questions;
  if (c.type === 'transform') {
    questions = shuffle(c.pool).slice(0, c.sessionLength)
      .map((q, i) => Object.assign({}, q, { num: i + 1 }));
  } else {
    passage = c.passages[Math.floor(Math.random() * c.passages.length)];
    questions = passage.questions;
  }
  session = { cat: c, passage, questions, answers: {}, idx: 0 };
}

function curQ() { return session.questions[session.idx]; }
function answerOf(num) { return session.answers[num]; }
function hasAnswer(q) {
  const a = session.answers[q.num];
  if (q.type === 'mc') return a != null;
  return a != null && String(a).trim() !== '';
}

/* ---------------- View-Steuerung ---------------- */
function show(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  $('#' + viewId).classList.add('active');
}

/* ---------------- HOME ---------------- */
function renderHome() {
  const scores = loadScores();
  const html = DATA.categories.map(c => {
    const s = scores[c.id];
    let progress;
    if (s) {
      const best = s.best != null ? s.best : s.pct;
      const bp = Math.round(best * 100);
      const passed = best >= PASS_THRESHOLD;
      const cls = passed ? 'pass' : 'fail';
      const status = passed ? '✓ Bestanden' : 'Ziel: 60 %';
      progress = `
        <span class="card-progress">
          <span class="cp-bar"><span class="cp-fill ${cls}" style="width:${bp}%"></span><span class="cp-mark"></span></span>
          <span class="cp-labels"><span class="cp-pct ${cls}">${bp}%</span><span class="cp-status">${status}</span></span>
        </span>`;
    } else {
      progress = `
        <span class="card-progress">
          <span class="cp-bar"><span class="cp-fill none" style="width:0%"></span><span class="cp-mark"></span></span>
          <span class="cp-labels"><span class="cp-pct none">0%</span><span class="cp-status">Noch nicht geübt</span></span>
        </span>`;
    }
    return `
      <button class="card" data-cat="${c.id}">
        <span class="card-icon">${escapeHtml(c.icon)}</span>
        <span class="card-main">
          <span class="card-meta">${escapeHtml(c.shortName)} · ${c.sessionLength} Q · Pool ${poolSize(c)}</span>
          <span class="card-name">${escapeHtml(c.name)}</span>
          <span class="card-desc">${escapeHtml(c.description)}</span>
          ${progress}
        </span>
        <span class="card-chevron">›</span>
      </button>`;
  }).join('');
  $('#cards').innerHTML = html;
  $('#cards').querySelectorAll('.card').forEach(el =>
    el.addEventListener('click', () => startQuiz(el.dataset.cat)));
}

/* ---------------- QUIZ ---------------- */
function startQuiz(catId) {
  buildSession(catId);
  show('view-quiz');
  renderQuiz();
}

function renderQuiz() {
  const c = session.cat, q = curQ(), total = session.questions.length;
  $('#q-cat').textContent = c.shortName;
  $('#q-name').textContent = c.name;
  $('#q-count').textContent = `${session.idx + 1}/${total}`;

  // Ticks
  $('#q-ticks').innerHTML = session.questions.map((_, i) =>
    `<span class="tick ${i < session.idx ? 'done' : i === session.idx ? 'cur' : ''}"></span>`).join('');

  // Passage-Pane (Parts 1–3) oder verstecken (Part 4)
  const pane = $('#passage-pane');
  if (session.passage) {
    pane.style.display = '';
    $('#passage-title').textContent = session.passage.title;
    $('#passage-text').innerHTML = renderPassage(session.passage, q.num);
  } else {
    pane.style.display = 'none';
  }

  // Frage-Body
  $('#qbody-inner').innerHTML = renderQuestionBody(q);
  wireQuestionBody(q);

  // Nav
  $('#q-prev').textContent = session.idx === 0 ? '✕ Beenden' : '← Zurück';
  const next = $('#q-next');
  next.textContent = session.idx === total - 1 ? 'Auswerten ✓' : 'Weiter →';
  next.disabled = !hasAnswer(q);

  // Scroll zur aktiven Lücke
  if (session.passage) {
    requestAnimationFrame(() => {
      const active = $('#passage-text .gap.active');
      if (active) active.scrollIntoView({ block: 'center', behavior: 'smooth' });
      $('#quiz-body').scrollTop = $('#quiz-body').scrollHeight; // Frage ins Bild
    });
  }
}

function renderPassage(passage, activeNum) {
  // Text mit {N} → styled spans
  const parts = passage.text.split(/(\{\d+\})/g);
  return parts.map(part => {
    const m = part.match(/^\{(\d+)\}$/);
    if (!m) return escapeHtml(part);
    const num = parseInt(m[1], 10);
    const q = passage.questions.find(x => x.num === num);
    const ans = session.answers[num];
    let state = 'empty', label;
    if (num === activeNum) state = 'active';
    else if (q.type === 'mc' ? ans != null : (ans != null && String(ans).trim() !== '')) state = 'answered';

    if (state === 'answered') {
      label = q.type === 'mc' ? escapeHtml(q.options[ans]) : escapeHtml(String(ans).trim());
    } else if (q.type === 'word') {
      label = `${num} · ${escapeHtml(q.base)}`;
    } else {
      label = String(num);
    }
    return `<span class="gap ${state}">${label}</span>`;
  }).join('');
}

function renderQuestionBody(q) {
  const n = q.num;
  if (q.type === 'mc') {
    const opts = q.options.map((opt, i) => {
      const sel = session.answers[n] === i ? ' sel' : '';
      const letter = 'ABCD'[i];
      return `<button class="option${sel}" data-i="${i}">
        <span class="marker"></span><span class="lett">${letter}</span>
        <span class="txt">${escapeHtml(opt)}</span></button>`;
    }).join('');
    return `<div class="q-eyebrow">${escapeHtml(session.cat.shortName)} · Multiple-Choice</div>
      <div class="q-prompt">Wähle das beste Wort für Lücke <b>(${n})</b>.</div>
      <div class="options">${opts}</div>`;
  }

  if (q.type === 'open') {
    const val = session.answers[n] != null ? escapeHtml(session.answers[n]) : '';
    return `<div class="q-eyebrow">${escapeHtml(session.cat.shortName)} · Open Cloze</div>
      <div class="q-prompt">Ein Wort für Lücke <b>(${n})</b>.</div>
      <div class="hint">Meist Präpositionen, Phrasal-Verb-Partikel oder Strukturwörter.</div>
      <input class="answer-input" id="ans" type="text" inputmode="text"
        autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
        placeholder="ein Wort…" value="${val}" />`;
  }

  if (q.type === 'word') {
    const val = session.answers[n] != null ? escapeHtml(session.answers[n]) : '';
    return `<div class="q-eyebrow">${escapeHtml(session.cat.shortName)} · Word Formation</div>
      <div class="q-prompt">Bilde die richtige Form für Lücke <b>(${n})</b>.</div>
      <div class="basework">
        <span class="base-tag">${escapeHtml(q.base)}</span>
        <span class="arrow">→</span>
      </div>
      <input class="answer-input" id="ans" type="text" inputmode="text"
        autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
        placeholder="umgeformtes Wort…" value="${val}" />`;
  }

  // transform
  const val = session.answers[n] != null ? escapeHtml(session.answers[n]) : '';
  const gapped = escapeHtml(q.gapped).replace(/_+/, '<span class="tgap-mark">⟨ 2–5 Wörter ⟩</span>');
  return `<div class="q-eyebrow">${escapeHtml(session.cat.shortName)} · Key Word Transformation</div>
    <div class="tblock">
      <div class="tline torig"><span class="tlabel">Original</span>${escapeHtml(q.original)}</div>
      <div><span class="tlabel">Schlüsselwort</span><span class="tkey">${escapeHtml(q.keyword)}</span></div>
      <div class="tline tgapped"><span class="tlabel">Vervollständige</span>${gapped}</div>
    </div>
    <input class="answer-input" id="ans" type="text" inputmode="text"
      autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
      placeholder="2–5 Wörter…" value="${val}" />`;
}

function wireQuestionBody(q) {
  if (q.type === 'mc') {
    $('#qbody-inner').querySelectorAll('.option').forEach(el => {
      el.addEventListener('click', () => {
        session.answers[q.num] = parseInt(el.dataset.i, 10);
        renderQuiz();
      });
    });
  } else {
    const inp = $('#ans');
    inp.addEventListener('input', () => {
      session.answers[q.num] = inp.value;
      $('#q-next').disabled = !hasAnswer(q);
      // Lücken-Status live aktualisieren (ohne Fokus zu verlieren)
      if (session.passage) $('#passage-text').innerHTML = renderPassage(session.passage, q.num);
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); if (hasAnswer(q)) goNext(); }
    });
    // Autofokus auf Desktop/Tablet (nicht auf Phone, um Tastatur-Sprung zu vermeiden)
    if (window.matchMedia('(min-width:600px)').matches) setTimeout(() => inp.focus(), 50);
  }
}

function goNext() {
  if (!hasAnswer(curQ())) return;
  if (session.idx < session.questions.length - 1) {
    session.idx++;
    renderQuiz();
  } else {
    finishQuiz();
  }
}
function goPrev() {
  if (session.idx === 0) { openModal('quit'); return; }
  session.idx--;
  renderQuiz();
}

/* ---------------- RESULTS ---------------- */
function gradeBand(pct) {
  if (pct >= 0.85) return { grade: 'A — Excellent', verdict: 'Sehr starkes Ergebnis. Du bewegst dich auf C1-Bestnote / C2-Niveau zu.' };
  if (pct >= 0.75) return { grade: 'B — Good Pass', verdict: 'Solides C1. Komfortabel über der Bestehensgrenze.' };
  if (pct >= 0.60) return { grade: 'C — Pass', verdict: 'Bestanden, aber knapp. Diese Kategorie noch ein paar Mal wiederholen.' };
  if (pct >= 0.50) return { grade: 'Knapp daneben', verdict: 'Sehr nah dran. Mit ein paar Wiederholungen sind die 60 % erreichbar.' };
  return { grade: 'Noch nicht', verdict: 'Empfehlung: das Thema systematisch durcharbeiten (z. B. mit Objective Advanced).' };
}

function finishQuiz() {
  const qs = session.questions;
  const correct = qs.filter(q => isCorrect(q, session.answers[q.num])).length;
  const total = qs.length;
  const pct = correct / total;
  const passed = pct >= PASS_THRESHOLD;
  saveScore(session.cat.id, pct, passed);
  renderResults(correct, total, pct, passed);
  show('view-results');
  $('.results-scroll').scrollTop = 0;
}

function renderResults(correct, total, pct, passed) {
  const c = session.cat;
  const pctRound = Math.round(pct * 100);
  const cls = passed ? 'pass' : 'fail';
  const { grade, verdict } = gradeBand(pct);
  $('#r-cat').textContent = `${c.shortName} · Auswertung`;
  $('#r-name').textContent = c.name;

  $('#res-hero-inner').innerHTML = `
    <div class="eyebrow">${escapeHtml(c.shortName)} · ${escapeHtml(c.name)}</div>
    <h2>Ergebnis</h2>
    <div class="score-box ${cls}">
      <span class="score-num">${correct}/${total}</span>
      <span class="score-pct">${pctRound}% · Schwelle 60%</span>
    </div>
    <div class="passbar-wrap">
      <div class="passbar">
        <div class="passbar-fill ${cls}" style="width:${pctRound}%"></div>
        <div class="passbar-mark"></div>
      </div>
      <div class="passbar-labels"><span>0%</span><span>60% Bestehen</span><span>100%</span></div>
    </div>
    <div class="grade-badge ${cls}">${passed ? '✓ Bestanden' : '✗ Nicht bestanden'} · ${escapeHtml(grade)}</div>
    <div class="verdict">${escapeHtml(verdict)}</div>`;

  $('#review-list').innerHTML = session.questions.map(q => reviewItem(q)).join('');
}

function reviewItem(q) {
  const ans = session.answers[q.num];
  const ok = isCorrect(q, ans);
  const where = q.type === 'transform'
    ? `Transformation (${q.num}) · ${escapeHtml(q.keyword)}`
    : `Lücke (${q.num})`;

  let correctTxt, yourTxt;
  if (q.type === 'mc') {
    correctTxt = `${'ABCD'[q.correct]} — ${escapeHtml(q.options[q.correct])}`;
    yourTxt = ans != null ? `${'ABCD'[ans]} — ${escapeHtml(q.options[ans])}` : '—';
  } else {
    correctTxt = q.accept.map(escapeHtml).join(' / ');
    yourTxt = (ans != null && String(ans).trim() !== '') ? escapeHtml(String(ans).trim()) : '—';
  }

  const ansLine = ok
    ? `<div class="rev-ans"><span class="right">Richtig: ${correctTxt}</span></div>`
    : `<div class="rev-ans"><span class="you">Du: <s>${yourTxt}</s></span> &nbsp;·&nbsp; <span class="right">Richtig: ${correctTxt}</span></div>`;

  return `
    <div class="rev-item">
      <div class="rev-top">
        <span class="rev-num">${q.num}</span>
        <span class="rev-flag ${ok ? 'ok' : 'no'}">${ok ? '✓ Richtig' : '✗ Falsch'}</span>
      </div>
      <div class="rev-where">${where}</div>
      ${ansLine}
      <div class="rev-exp">${escapeHtml(q.explanation)}</div>
    </div>`;
}

/* ---------------- Modal ---------------- */
let modalAction = null;
function openModal(kind) {
  modalAction = kind;
  $('#modal-title').textContent = 'Test abbrechen?';
  $('#modal-text').textContent = 'Dein bisheriger Fortschritt in dieser Session geht verloren.';
  $('#modal').classList.add('show');
}
function closeModal() { $('#modal').classList.remove('show'); modalAction = null; }

/* ---------------- Events ---------------- */
$('#q-next').addEventListener('click', goNext);
$('#q-prev').addEventListener('click', goPrev);
$('#q-close').addEventListener('click', () => openModal('quit'));

$('#modal-cancel').addEventListener('click', closeModal);
$('#modal-ok').addEventListener('click', () => {
  closeModal();
  renderHome();
  show('view-home');
});

$('#r-home').addEventListener('click', () => { renderHome(); show('view-home'); });
$('#r-close').addEventListener('click', () => { renderHome(); show('view-home'); });
$('#r-retry').addEventListener('click', () => { startQuiz(session.cat.id); });

/* Browser-Back abfangen, damit kein versehentliches Verlassen */
window.addEventListener('keydown', e => {
  if (e.key === 'Escape' && $('#modal').classList.contains('show')) closeModal();
});

/* ---------------- PWA: Service Worker + Installation ---------------- */
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}

const installArea = $('#install-area');
const installBtn = $('#install-btn');
const installHint = $('#install-hint');
let deferredPrompt = null;

const isStandalone = () =>
  window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
const isiOS = () =>
  /iphone|ipad|ipod/i.test(navigator.userAgent) ||
  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (isStandalone()) return;
  installArea.hidden = false;
  installBtn.hidden = false;
  installHint.hidden = true;
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  installArea.hidden = true;
});

window.addEventListener('appinstalled', () => { installArea.hidden = true; });

// iOS/iPadOS Safari kennt kein beforeinstallprompt → Anleitung einblenden.
if (!isStandalone() && isiOS()) {
  installArea.hidden = false;
  installBtn.hidden = true;
  installHint.hidden = false;
  installHint.innerHTML =
    'Auf iPhone/iPad in <b>Safari</b>: unten das <b>Teilen-Symbol</b> antippen → ' +
    '<b>„Zum Home-Bildschirm“</b>. Danach startet der Trainer wie eine echte App – auch offline.';
}
if (isStandalone()) installArea.hidden = true;

/* ---------------- Init ---------------- */
renderHome();

</script>
</body>
</html>
