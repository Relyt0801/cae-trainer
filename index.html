<title>CAE Trainer — C1 Advanced</title>
<style>
:root{
  color-scheme:dark;
  --bg:#0E1621; --surface:#16202D; --surface-2:#121B26; --surface-3:#1E2A38;
  --ink:#EAEFF6; --inkSoft:#A6B4C4; --inkFaint:#6E7E91;
  --rule:#26323F; --ruleStrong:#3A4859;
  --accent:#5B8DEF; --accentDark:#3F73D6; --accentSoft:rgba(var(--glow),.15);
  --correct:#54D183; --correctBg:rgba(52,153,93,.18); --correctBd:rgba(84,209,131,.40);
  --wrong:#F0726B; --wrongBg:rgba(217,75,68,.18); --wrongBd:rgba(240,114,107,.40);
  --hi:rgba(244,213,138,.16); --hiBd:#C9A24A;
  --onAccent:var(--onAccent); --cardHover:var(--cardHover); --heroTop:var(--heroTop); --glow:91,141,239;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  --mono:ui-monospace,'SF Mono','Cascadia Mono','Roboto Mono',Menlo,Consolas,monospace;
  --pad:20px; --maxw:760px;
  --r:14px; --rsm:9px; --rxs:6px;
  --sh:0 1px 2px rgba(0,0,0,.35), 0 4px 14px rgba(0,0,0,.28);
  --shLg:0 10px 34px rgba(0,0,0,.50);
}
html.theme-light{
  color-scheme:light;
  --bg:#F1F4F9; --surface:#FFFFFF; --surface-2:#F7F9FC; --surface-3:#EAEEF4;
  --ink:#16212E; --inkSoft:#4C5A6B; --inkFaint:#8492A2;
  --rule:#E4E9F0; --ruleStrong:#CCD5E0;
  --accent:#2257D6; --accentDark:#1B45AD; --accentSoft:rgba(34,87,214,.10);
  --correct:#1C8A4E; --correctBg:rgba(28,138,78,.10); --correctBd:rgba(28,138,78,.32);
  --wrong:#C5372C; --wrongBg:rgba(197,55,44,.08); --wrongBd:rgba(197,55,44,.28);
  --onAccent:#FFFFFF; --cardHover:#F3F6FB; --heroTop:#E8EFFC; --glow:34,87,214;
  --sh:0 1px 2px rgba(20,40,80,.06), 0 6px 18px rgba(20,40,80,.07);
  --shLg:0 14px 40px rgba(20,40,80,.14);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:var(--bg); color:var(--ink);
  font-family:var(--sans); font-size:16px; line-height:1.55;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  overscroll-behavior-y:none;
}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none;}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}

/* ---------- layout shell ---------- */
#app{min-height:100%;display:flex;flex-direction:column;}
.view{flex:1;display:none;flex-direction:column;min-height:0;}
.view.active{display:flex;animation:viewIn .26s ease both;}
@keyframes viewIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.wrap{width:100%;max-width:var(--maxw);margin:0 auto;padding-left:var(--pad);padding-right:var(--pad);}

/* ---------- eyebrow / labels ---------- */
.eyebrow{font-family:var(--mono);text-transform:uppercase;letter-spacing:.18em;font-size:11px;font-weight:600;color:var(--accent);}
.mono{font-family:var(--mono);letter-spacing:.04em;}

/* ---------- HOME ---------- */
.home-scroll{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;}
.home-header{
  position:relative;overflow:hidden;
  padding-top:calc(40px + env(safe-area-inset-top));
  padding-bottom:24px;
  background:linear-gradient(180deg,var(--heroTop) 0%,var(--surface-2) 100%);
  border-bottom:1px solid var(--rule);
}
.hero-art{position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(480px 260px at 88% -12%, rgba(var(--glow),.18), transparent 62%),
    radial-gradient(360px 220px at -8% 112%, rgba(84,209,131,.06), transparent 60%);}
.hero-art::after{content:"";position:absolute;inset:0;
  background-image:linear-gradient(rgba(var(--glow),.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(var(--glow),.05) 1px,transparent 1px);
  background-size:34px 34px;
  -webkit-mask-image:radial-gradient(72% 86% at 72% 14%, #000 0%, transparent 78%);
  mask-image:radial-gradient(72% 86% at 72% 14%, #000 0%, transparent 78%);}
.home-header .wrap{position:relative;}
.home-hero{display:flex;align-items:center;justify-content:space-between;gap:18px;}
.hero-text{min-width:0;}
.home-header .eyebrow{margin-bottom:12px;}
.home-title{font-weight:760;font-size:clamp(27px,6.6vw,38px);line-height:1.06;letter-spacing:-.02em;margin:0;color:var(--ink);}
.home-title em{font-style:normal;font-weight:760;color:var(--accent);}
.home-sub{color:var(--inkSoft);margin-top:11px;font-size:15px;font-weight:450;}

/* hero ring */
.hero-ring{flex:none;width:96px;height:96px;}
.ring{width:100%;height:100%;display:block;}
.ring-bg{fill:none;stroke:var(--surface-3);stroke-width:6;}
.ring-fg{fill:none;stroke-width:6;stroke-linecap:round;
  transform:rotate(-90deg);transform-origin:50% 50%;
  transition:stroke-dashoffset .9s cubic-bezier(.2,.7,.2,1);}
.ring-num{fill:var(--ink);font-family:var(--sans);font-size:15px;font-weight:760;text-anchor:middle;letter-spacing:-.02em;}
.ring-cap{fill:var(--inkFaint);font-family:var(--mono);font-size:5.6px;font-weight:600;letter-spacing:.16em;text-anchor:middle;}

/* hero chips */
.hero-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;}
.chip{display:inline-flex;align-items:center;gap:7px;padding:7px 12px;
  background:rgba(var(--glow),.08);border:1px solid rgba(var(--glow),.22);border-radius:99px;
  font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.05em;color:var(--inkSoft);}
.chip svg{width:13px;height:13px;color:var(--accent);flex:none;}
.chip b{color:var(--ink);font-weight:700;}
.chip.ok{background:var(--correctBg);border-color:var(--correctBd);}
.chip.ok svg{color:var(--correct);}

/* sections */
.cards{padding-top:22px;padding-bottom:calc(34px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:26px;}
.sec{display:flex;flex-direction:column;gap:12px;min-width:0;}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:0 2px;}
.sec-title{font-size:15px;font-weight:740;letter-spacing:-.01em;color:var(--ink);}
.sec-meta{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--inkFaint);}
.sec-grid{display:grid;grid-template-columns:1fr;gap:13px;}
.sec-grid > .card:only-child{grid-column:1/-1;}

.card{
  display:flex;gap:15px;align-items:flex-start;text-align:left;width:100%;
  background:var(--surface);border:1px solid var(--rule);border-radius:var(--r);padding:17px;
  box-shadow:var(--sh);position:relative;
  transition:border-color .18s ease, box-shadow .18s ease, transform .14s ease, background .18s ease;
}
.card:active{transform:translateY(1px) scale(.995);}
.card:hover{border-color:rgba(var(--glow),.45);background:var(--cardHover);box-shadow:var(--shLg);transform:translateY(-2px);}
.card:hover .card-chevron{color:var(--accent);transform:translateX(2px);}
.card-icon{flex:none;width:48px;height:48px;background:var(--surface-3);color:var(--accent);border:1px solid var(--ruleStrong);border-radius:var(--rsm);
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.04em;}
.card-icon svg{width:23px;height:23px;}
.card-main{flex:1;min-width:0;}
.card-in{animation:cardIn .42s cubic-bezier(.2,.7,.2,1) both;}
@keyframes cardIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.card-meta,.card-name,.card-desc,.card-progress{display:block;}
.card-meta{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--inkFaint);}
.card-name{font-weight:700;font-size:19px;line-height:1.2;letter-spacing:-.01em;margin:5px 0 4px;color:var(--ink);}
.card-desc{font-size:13.5px;color:var(--inkSoft);line-height:1.45;}
.card-chevron{flex:none;align-self:center;font-size:24px;color:var(--inkFaint);font-weight:400;transition:color .18s ease,transform .18s ease;}

/* featured exam card */
.card-exam{
  background:linear-gradient(135deg, rgba(var(--glow),.16) 0%, rgba(var(--glow),.05) 42%, var(--surface) 100%);
  border:1px solid rgba(var(--glow),.45);
}
.card-exam::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:radial-gradient(300px 140px at 100% 0%, rgba(var(--glow),.14), transparent 70%);}
.card-exam:hover{border-color:var(--accent);}
.card-exam .card-icon{background:var(--accent);color:var(--onAccent);border-color:var(--accent);
  box-shadow:0 4px 14px rgba(var(--glow),.35);}

/* card progress */
.card-progress{margin-top:18px;}
.cp-bar{display:block;position:relative;height:8px;background:var(--surface-3);border-radius:99px;overflow:visible;}
.cp-fill{position:absolute;left:0;top:0;bottom:0;width:0;border-radius:99px;transition:width .6s cubic-bezier(.2,.7,.2,1);}
.cp-fill.pass{background:var(--correct);}
.cp-fill.fail{background:var(--accent);}
.cp-fill.none{background:transparent;}
.cp-mark{position:absolute;top:-3px;bottom:-3px;left:60%;width:2px;background:var(--ruleStrong);border-radius:2px;}
.cp-mark::after{content:"60";position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:8.5px;letter-spacing:.04em;color:var(--inkFaint);}
.cp-labels{display:flex;justify-content:space-between;align-items:baseline;margin-top:11px;}
.cp-pct{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.02em;}
.cp-pct.pass{color:var(--correct);} .cp-pct.fail{color:var(--accent);} .cp-pct.none{color:var(--inkFaint);}
.cp-status{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--inkFaint);}

/* install */
.install-area{margin-top:20px;}
.install-btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--sans);font-size:13px;font-weight:600;
  letter-spacing:.01em;padding:11px 18px;background:var(--accent);color:var(--onAccent);border-radius:var(--rsm);box-shadow:var(--sh);}
.install-btn:active{transform:translateY(1px);}
.install-hint{margin-top:12px;font-size:13.5px;line-height:1.55;color:var(--inkSoft);
  background:var(--accentSoft);border:1px solid rgba(var(--glow),.35);border-radius:var(--rsm);padding:13px 15px;}
.install-hint b{color:var(--ink);font-weight:650;}

/* ---------- topbar ---------- */
.topbar{
  padding-top:calc(14px + env(safe-area-inset-top));padding-bottom:13px;
  border-bottom:1px solid var(--rule);background:var(--surface-2);
}
.topbar-row{display:flex;align-items:flex-start;gap:13px;}
.icon-btn{flex:none;width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  font-size:22px;line-height:1;color:var(--inkSoft);border:1px solid var(--rule);border-radius:var(--rsm);background:var(--surface);
  transition:background .12s ease,border-color .12s ease;}
.icon-btn:active{background:var(--surface-3);}
.topbar-titles{flex:1;min-width:0;}
.topbar-titles .row1{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
.topbar-cat{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);}
.topbar-count{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.04em;color:var(--inkSoft);}
.topbar-name{font-weight:700;font-size:17px;line-height:1.15;letter-spacing:-.01em;margin-top:2px;}
.ticks{display:flex;gap:5px;margin-top:13px;}
.tick{flex:1;height:4px;border-radius:99px;background:var(--surface-3);transition:background .2s ease,opacity .2s ease;}
.tick.done{background:var(--accent);}
.tick.cur{background:var(--accent);opacity:.45;}

/* ---------- quiz body ---------- */
.quiz-body{flex:1;display:flex;flex-direction:column;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.passage-pane{
  background:var(--surface-2);border-bottom:1px solid var(--rule);
  max-height:32vh;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:none;
}
.passage-pane .wrap{padding-top:18px;padding-bottom:20px;}
.passage-pane.reading{max-height:54vh;}
.passage-title{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--inkFaint);margin-bottom:12px;}
.passage-text{font-size:15.5px;line-height:1.95;color:var(--inkSoft);}
.gap{font-family:var(--mono);font-size:.82em;font-weight:600;letter-spacing:.01em;padding:2px 9px;border:1px solid var(--ruleStrong);
  background:var(--surface-3);color:var(--inkSoft);white-space:nowrap;border-radius:99px;}
.gap.answered{background:var(--correctBg);border-color:var(--correctBd);color:var(--correct);}
.gap.active{background:var(--accentSoft);border-color:var(--accent);color:var(--accent);
  animation:glow 1.7s ease-in-out infinite;}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(var(--glow),0);}50%{box-shadow:0 0 0 4px rgba(var(--glow),.28);}}

.qbody{flex:1;}
.qbody .wrap{padding-top:20px;padding-bottom:24px;}
.q-eyebrow{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--inkFaint);margin-bottom:13px;}
.q-prompt{font-weight:700;font-size:clamp(19px,5vw,21px);line-height:1.28;letter-spacing:-.01em;margin-bottom:20px;}
.q-prompt b{color:var(--accent);font-weight:700;}

/* MC options */
.options{display:flex;flex-direction:column;gap:10px;}
.option{display:flex;align-items:center;gap:13px;text-align:left;width:100%;
  background:var(--surface);border:1px solid var(--rule);border-radius:var(--rsm);padding:14px 16px;min-height:54px;
  box-shadow:var(--sh);
  transition:border-color .12s ease,background .12s ease,box-shadow .12s ease;}
.option:hover{border-color:var(--ruleStrong);}
.option.sel{border-color:var(--accent);background:var(--accentSoft);box-shadow:0 0 0 1px var(--accent);}
.option .marker{flex:none;width:22px;height:22px;border:2px solid var(--ruleStrong);border-radius:50%;
  display:flex;align-items:center;justify-content:center;transition:border-color .12s ease;}
.option.sel .marker{border-color:var(--accent);}
.option.sel .marker::after{content:"";width:11px;height:11px;border-radius:50%;background:var(--accent);}
.option .lett{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--inkFaint);min-width:14px;}
.option.sel .lett{color:var(--accent);}
.option .txt{font-size:16px;}

/* text input area */
.hint{font-size:13px;color:var(--inkFaint);margin-bottom:14px;}
.basework{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.base-tag{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.06em;background:var(--surface-3);color:var(--ink);border:1px solid var(--ruleStrong);padding:8px 13px;border-radius:var(--rxs);}
.arrow{font-size:20px;color:var(--inkFaint);}
.answer-input{width:100%;font-family:var(--sans);font-size:17px;color:var(--ink);
  background:var(--surface);border:1px solid var(--ruleStrong);border-radius:var(--rsm);
  padding:14px 15px;transition:border-color .12s ease,box-shadow .12s ease;}
.answer-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accentSoft);background:var(--cardHover);}
.answer-input::placeholder{color:var(--inkFaint);}

/* transformation block */
.tblock{display:flex;flex-direction:column;gap:16px;margin-bottom:18px;
  background:var(--surface);border:1px solid var(--rule);border-radius:var(--r);padding:18px;box-shadow:var(--sh);}
.tline{font-size:15.5px;line-height:1.5;}
.tlabel{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--inkFaint);display:block;margin-bottom:5px;}
.torig{color:var(--inkSoft);}
.tkey{font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:.08em;background:var(--accent);color:var(--onAccent);padding:8px 14px;display:inline-block;border-radius:var(--rxs);}
.tgapped{font-size:16px;line-height:1.65;color:var(--ink);}
.tgap-mark{font-family:var(--mono);font-size:.78em;font-weight:600;letter-spacing:.02em;background:var(--accentSoft);border:1px dashed var(--accent);padding:2px 9px;color:var(--accent);white-space:nowrap;border-radius:99px;}

/* ---------- navbar ---------- */
.navbar{display:flex;gap:11px;border-top:1px solid var(--rule);background:var(--surface-2);
  padding:13px var(--pad) calc(13px + env(safe-area-inset-bottom));}
.nav-btn{flex:1;min-height:50px;display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:var(--sans);font-size:14px;font-weight:600;letter-spacing:.01em;
  border:1px solid var(--ruleStrong);border-radius:var(--rsm);background:var(--surface);color:var(--ink);
  transition:background .12s ease,border-color .12s ease,transform .06s ease,box-shadow .12s ease;}
.nav-btn:active{transform:translateY(1px);}
.nav-btn:hover{border-color:var(--inkFaint);}
.nav-btn.primary{background:linear-gradient(180deg,#6E9AF2 0%,var(--accent) 55%,var(--accentDark) 100%);
  color:var(--onAccent);border-color:var(--accentDark);box-shadow:0 5px 16px rgba(var(--glow),.28);}
.nav-btn.primary:hover{filter:brightness(1.06);}
.nav-btn.primary:disabled,.nav-btn:disabled{opacity:1;cursor:not-allowed;background:var(--surface-3);color:var(--inkFaint);border-color:var(--rule);transform:none;box-shadow:none;}

/* ---------- RESULTS ---------- */
.results-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.res-hero{text-align:center;padding-top:34px;padding-bottom:30px;border-bottom:1px solid var(--rule);background:var(--surface-2);}
.res-hero .eyebrow{margin-bottom:8px;}
.res-hero h2{font-weight:760;font-size:25px;letter-spacing:-.02em;margin:0 0 20px;}
.score-box{display:inline-flex;flex-direction:column;align-items:center;border:1.5px solid;border-radius:var(--r);padding:18px 34px;margin-bottom:22px;}
.score-box.pass{border-color:var(--correctBd);color:var(--correct);background:var(--correctBg);}
.score-box.fail{border-color:var(--wrongBd);color:var(--wrong);background:var(--wrongBg);}
.score-num{font-weight:760;font-size:44px;line-height:1;letter-spacing:-.02em;}
.score-pct{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.06em;margin-top:8px;}
.passbar-wrap{max-width:420px;margin:0 auto 20px;}
.passbar{position:relative;height:10px;background:var(--surface-3);border-radius:99px;}
.passbar-fill{position:absolute;left:0;top:0;bottom:0;border-radius:99px;}
.passbar-fill.pass{background:var(--correct);}
.passbar-fill.fail{background:var(--wrong);}
.passbar-mark{position:absolute;top:-4px;bottom:-4px;left:60%;width:2px;background:var(--ruleStrong);border-radius:2px;}
.passbar-labels{display:flex;justify-content:space-between;margin-top:8px;font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.06em;color:var(--inkFaint);}
.grade-badge{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:9px 15px;border:1px solid;border-radius:99px;margin-bottom:14px;}
.grade-badge.pass{color:var(--correct);border-color:var(--correctBd);background:var(--correctBg);}
.grade-badge.fail{color:var(--wrong);border-color:var(--wrongBd);background:var(--wrongBg);}
.verdict{color:var(--inkSoft);max-width:460px;margin:0 auto;font-size:15px;line-height:1.55;}

.review{padding-top:24px;padding-bottom:26px;}
.review-head{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--inkFaint);
  padding-bottom:12px;border-bottom:1px solid var(--rule);margin-bottom:4px;}
.rev-item{padding:18px 0;border-bottom:1px solid var(--rule);}
.rev-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.rev-num{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--inkFaint);min-width:22px;}
.rev-flag{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:99px;}
.rev-flag.ok{color:var(--correct);background:var(--correctBg);border:1px solid var(--correctBd);}
.rev-flag.no{color:var(--wrong);background:var(--wrongBg);border:1px solid var(--wrongBd);}
.rev-where{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--inkFaint);margin-bottom:7px;}
.rev-ans{font-size:15px;line-height:1.5;margin-bottom:5px;}
.rev-ans .you{color:var(--wrong);}
.rev-ans .you s{text-decoration:line-through;text-decoration-color:var(--wrong);}
.rev-ans .right{color:var(--correct);font-weight:600;}
.rev-exp{font-size:14px;color:var(--inkSoft);line-height:1.5;margin-top:4px;}
.rev-prompt{font-size:14.5px;color:var(--ink);line-height:1.45;margin-bottom:7px;}
.exam-breakdown{margin:20px auto 0;max-width:460px;display:flex;flex-direction:column;gap:9px;text-align:left;}
.exam-row{display:flex;align-items:center;gap:11px;}
.exam-row-label{flex:1;font-size:12.5px;color:var(--inkSoft);min-width:0;}
.exam-row-bar{flex:none;width:88px;height:7px;background:var(--surface-3);border-radius:99px;overflow:hidden;}
.exam-row-fill{display:block;height:100%;border-radius:99px;}
.exam-row-fill.pass{background:var(--correct);} .exam-row-fill.fail{background:var(--accent);}
.exam-row-val{flex:none;width:44px;text-align:right;font-family:var(--mono);font-size:12px;font-weight:600;}
.exam-row-val.pass{color:var(--correct);} .exam-row-val.fail{color:var(--accent);}
.review-part{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin:20px 0 2px;padding-top:6px;border-top:1px solid var(--rule);}

/* ---------- modal ---------- */
.modal-back{position:fixed;inset:0;background:rgba(4,8,13,.66);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:24px;z-index:50;}
.modal-back.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--rule);border-radius:var(--r);box-shadow:var(--shLg);max-width:380px;width:100%;padding:26px;}
.modal h3{font-weight:740;font-size:21px;letter-spacing:-.01em;margin:0 0 10px;}
.modal p{font-size:15px;color:var(--inkSoft);line-height:1.5;margin:0 0 22px;}
.modal-actions{display:flex;gap:11px;}
.modal-actions .nav-btn{flex:1;}

/* ---------- header menu button ---------- */
.home-toprow{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;}
.hdr-btn{flex:none;width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  color:var(--inkSoft);background:rgba(255,255,255,.03);border:1px solid var(--rule);border-radius:var(--rsm);
  transition:background .15s ease,border-color .15s ease,color .15s ease;}
.hdr-btn:hover{color:var(--ink);border-color:var(--ruleStrong);background:var(--surface);}
.hdr-btn:active{transform:translateY(1px);}
.hdr-btn svg{width:21px;height:21px;}

/* ---------- compact mode ---------- */
.compact .cards{gap:18px;}
.compact .sec-grid{grid-template-columns:1fr 1fr;gap:11px;}
.compact .card{flex-direction:column;align-items:flex-start;gap:11px;padding:14px;border-radius:var(--rsm);}
.compact .card-icon{width:38px;height:38px;border-radius:8px;}
.compact .card-icon svg{width:20px;height:20px;}
.compact .card-desc{display:none;}
.compact .card-chevron{display:none;}
.compact .card-name{font-size:15px;margin:3px 0 0;}
.compact .card-meta{font-size:9.5px;}
.compact .card-progress{margin-top:10px;width:100%;}
.compact .cp-mark,.compact .cp-mark::after{display:none;}
.compact .cp-status{display:none;}
.compact .cp-labels{margin-top:7px;}
.compact .card:hover{transform:translateY(-2px);}
@media (max-width:360px){ .compact .sec-grid{grid-template-columns:1fr;} }

/* ---------- settings ---------- */
.settings-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.settings-scroll .wrap{padding-top:22px;padding-bottom:calc(34px + env(safe-area-inset-bottom));}
.set-group{margin-bottom:26px;}
.set-group-title{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--inkFaint);margin-bottom:12px;}
.set-row{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--rule);border-radius:var(--r);padding:16px 17px;box-shadow:var(--sh);}
.set-row + .set-row{margin-top:11px;}
.set-row-main{flex:1;min-width:0;}
.set-row-name{font-size:15.5px;font-weight:650;color:var(--ink);}
.set-row-desc{font-size:13px;color:var(--inkSoft);line-height:1.45;margin-top:3px;}

/* toggle switch */
.switch{flex:none;position:relative;width:50px;height:30px;border-radius:99px;background:var(--surface-3);
  border:1px solid var(--ruleStrong);cursor:pointer;transition:background .18s ease,border-color .18s ease;}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;
  background:var(--inkSoft);transition:transform .2s cubic-bezier(.2,.7,.2,1),background .18s ease;}
.switch.on{background:var(--accentSoft);border-color:var(--accent);}
.switch.on::after{transform:translateX(20px);background:var(--accent);}

.set-reset{width:100%;min-height:50px;display:flex;align-items:center;justify-content:center;gap:9px;
  font-family:var(--sans);font-size:14px;font-weight:650;color:var(--wrong);
  background:var(--wrongBg);border:1px solid var(--wrongBd);border-radius:var(--rsm);}
.set-reset:active{transform:translateY(1px);}
.set-reset svg{width:17px;height:17px;}

/* per-mode history charts */
.charts{display:flex;flex-direction:column;gap:13px;}
.chart-card{background:var(--surface);border:1px solid var(--rule);border-radius:var(--r);padding:15px 16px 12px;box-shadow:var(--sh);}
.chart-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:4px;}
.chart-name{font-size:14.5px;font-weight:650;color:var(--ink);}
.chart-stat{font-family:var(--mono);font-size:12px;font-weight:600;}
.chart-stat.pass{color:var(--correct);} .chart-stat.fail{color:var(--accent);} .chart-stat.none{color:var(--inkFaint);}
.chart-sub{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--inkFaint);margin-bottom:8px;}
.chart-svg{width:100%;height:auto;display:block;overflow:visible;}
.chart-empty{font-size:13px;color:var(--inkFaint);font-style:normal;padding:14px 0 6px;}
.ch-grid{stroke:var(--rule);stroke-width:1;}
.ch-thresh{stroke:var(--ruleStrong);stroke-width:1;stroke-dasharray:3 3;}
.ch-line{fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;}
.ch-dot{stroke:var(--surface);stroke-width:1.6;}
.ch-dot-last{stroke:var(--surface);stroke-width:2;}
.ch-thresh-lab{fill:var(--inkFaint);font-family:var(--mono);font-size:7px;letter-spacing:.06em;}
@media (min-width:720px){ .charts{display:grid;grid-template-columns:1fr 1fr;gap:13px;} }

/* ---------- responsive ---------- */
@media (max-width:419px){
  .hero-ring{width:82px;height:82px;}
}
@media (min-width:600px){
  :root{--pad:32px;}
  body{font-size:17px;}
  .home-header{padding-top:calc(50px + env(safe-area-inset-top));padding-bottom:30px;}
  .hero-ring{width:112px;height:112px;}
  .hero-chips{margin-top:22px;gap:10px;}
  .chip{font-size:11.5px;padding:8px 14px;}
  .card{padding:21px;}
  .card-icon{width:54px;height:54px;}
  .card-icon svg{width:26px;height:26px;}
  .card-name{font-size:21px;}
  .sec-title{font-size:16.5px;}
  .options{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .q-prompt{font-size:24px;}
  .passage-pane{max-height:40vh;}
  .passage-text{font-size:16.5px;}
}
@media (min-width:720px){
  .sec-grid{grid-template-columns:1fr 1fr;gap:15px;}
}
@media (min-width:1000px){
  :root{--maxw:920px;--pad:40px;}
  .home-header{padding-top:calc(62px + env(safe-area-inset-top));padding-bottom:34px;}
  .hero-ring{width:124px;height:124px;}
  .cards{padding-top:28px;gap:30px;}
}
@media (min-width:600px) and (orientation:landscape){
  .passage-pane{max-height:38vh;}
}
@media (max-width:599px) and (orientation:landscape){
  .passage-pane{max-height:46vh;}
}
@media (prefers-reduced-motion:reduce){
  .gap.active{animation:none;box-shadow:0 0 0 3px rgba(var(--glow),.28);}
  .view.active,.card-in{animation:none;}
  *{transition:none !important;}
}

<script>
/* CAE Trainer — App-Logik (Vanilla JS).
   Views: home / quiz / results. State via einfache Module-Variablen. */

'use strict';

const PASS_THRESHOLD = 0.6;
const STORE_KEY = 'cae_trainer_scores_v1';
const COMPACT_KEY = 'cae_trainer_compact';

/* ---------------- Persistenz ---------------- */
function loadScores() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch (_) { return {}; }
}
function saveScore(catId, pct, passed) {
  const all = loadScores();
  const prev = all[catId] || {};
  const prevBest = prev.best != null ? prev.best : (prev.pct || 0);
  const best = Math.max(prevBest, pct);
  const history = (Array.isArray(prev.history) ? prev.history : []).concat([{ p: pct, t: Date.now() }]);
  while (history.length > 40) history.shift();
  const attempts = (prev.attempts || 0) + 1;
  // Laufende Summe aller Einheiten-Prozente -> exakter Durchschnitt (unabhängig vom history-Limit)
  const prevSum = (typeof prev.sum === 'number') ? prev.sum : (prev.pct || 0) * (prev.attempts || 0);
  const sum = prevSum + pct;
  all[catId] = { pct, passed, when: Date.now(), best, attempts, sum, history };
  try { localStorage.setItem(STORE_KEY, JSON.stringify(all)); } catch (_) {}
}
function resetScores() {
  try { localStorage.removeItem(STORE_KEY); } catch (_) {}
}
function loadCompact() {
  try { return localStorage.getItem(COMPACT_KEY) === '1'; } catch (_) { return false; }
}
function saveCompact(on) {
  try { localStorage.setItem(COMPACT_KEY, on ? '1' : '0'); } catch (_) {}
}
function applyCompact() {
  document.getElementById('app').classList.toggle('compact', loadCompact());
}
const THEME_KEY = 'cae_trainer_theme';
function loadTheme() {
  try { const t = localStorage.getItem(THEME_KEY); if (t === 'light' || t === 'dark') return t; } catch (_) {}
  return (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
}
function saveTheme(t) { try { localStorage.setItem(THEME_KEY, t); } catch (_) {} }
function applyTheme() {
  const light = loadTheme() === 'light';
  document.documentElement.classList.toggle('theme-light', light);
  const m = document.querySelector('meta[name="theme-color"]');
  if (m) m.setAttribute('content', light ? '#F1F4F9' : '#0E1621');
}

/* ---------------- Helpers ---------------- */
const $ = (sel, root = document) => root.querySelector(sel);
const cat = id => DATA.categories.find(c => c.id === id);
function poolSize(c) {
  return c.passages ? c.passages.reduce((n, p) => n + p.questions.length, 0) : c.pool.length;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
/* Antwortoptionen je MC-Frage zufällig anordnen, damit nicht immer dieselbe
   Position (z.B. A) richtig ist. correct/also werden auf die neue Reihenfolge
   abgebildet. Bei Multiple Matching übersprungen (Optionen sind feste Namen). */
function randomizeOptions(questions, skip) {
  if (skip) return questions;
  return questions.map(q => {
    if (q.type !== 'mc' || !Array.isArray(q.options) || q.options.length < 2) return q;
    const order = shuffle(q.options.map((_, i) => i));   // neue -> alte Position
    const options = order.map(i => q.options[i]);
    const remap = oldI => order.indexOf(oldI);
    const nq = Object.assign({}, q, { options });
    if (typeof q.correct === 'number') nq.correct = remap(q.correct);
    if (Array.isArray(q.also)) nq.also = q.also.map(remap);
    return nq;
  });
}

/* ---------------- Bewertung ---------------- */
function normalize(s) {
  return String(s)
    .toLowerCase()
    .replace(/[‘’‚‛′‵]/g, "'") // smart single quotes → '
    .replace(/[“”″]/g, '"')
    .trim()
    .replace(/\s+/g, ' ');
}
function isCorrect(q, answer) {
  if (q.type === 'mc') return Array.isArray(q.correct) ? q.correct.includes(answer) : answer === q.correct;
  if (answer == null || String(answer).trim() === '') return false;
  const n = normalize(answer);
  return q.accept.some(acc => normalize(acc) === n);
}

/* ---------------- Session ---------------- */
let session = null;

/* ---------------- Anti-Wiederholung ---------------- */
let recentPassage = {};      // key -> Warteschlange zuletzt gezeigter Passagen-Titel
let recentTransforms = [];   // Warteschlange zuletzt genutzter Transformations-Sätze

function pickPassage(c, kind) {
  let ps = c.passages;
  let key = c.id;
  if (kind) { ps = ps.filter(p => p.kind === kind); key = c.id + ':' + kind; }
  if (!ps.length) return null;
  if (ps.length === 1) return ps[0];

  let recent = recentPassage[key] || [];
  // Erst alle noch nicht gezeigten Texte nutzen — so kommt nie ein Text doppelt,
  // bevor nicht jeder andere Text dieses Modus an der Reihe war.
  let pool = ps.filter(p => recent.indexOf(p.title) === -1);
  if (!pool.length) {                         // ganzer Zyklus durch -> zurücksetzen
    const last = recent[recent.length - 1];   // nur den allerletzten weiter meiden
    recent = last ? [last] : [];
    pool = ps.filter(p => p.title !== last);
    if (!pool.length) pool = ps.slice();
  }
  const choice = pool[Math.floor(Math.random() * pool.length)];
  recent.push(choice.title);
  while (recent.length > ps.length - 1) recent.shift(); // höchstens (n-1) merken
  recentPassage[key] = recent;
  return choice;
}
function pickTransforms(c, n) {
  const recentSet = new Set(recentTransforms);
  const fresh = shuffle(c.pool.filter(t => !recentSet.has(t.original)));
  const used = shuffle(c.pool.filter(t => recentSet.has(t.original)));
  const chosen = fresh.concat(used).slice(0, n);
  chosen.forEach(t => recentTransforms.push(t.original));
  const cap = Math.max(0, Math.min(c.pool.length - n, 30));
  while (recentTransforms.length > cap) recentTransforms.shift();
  return chosen.map((q, i) => Object.assign({}, q, { num: i + 1 }));
}

function buildSession(catId) {
  const c = cat(catId);
  let passage = null, questions;
  if (c.type === 'transform') {
    questions = pickTransforms(c, c.sessionLength);
  } else {
    passage = pickPassage(c);
    questions = randomizeOptions(passage.questions, passage.kind === 'mm');
  }
  session = { cat: c, passage, questions, answers: {}, idx: 0 };
}

function curQ() { return session.questions[session.idx]; }
function answerOf(num) { return session.answers[num]; }
function hasAnswer(q) {
  const a = session.answers[q.num];
  if (q.type === 'mc') return a != null;
  return a != null && String(a).trim() !== '';
}

/* ---------------- View-Steuerung ---------------- */
function show(viewId) {

  $('#' + viewId).classList.add('active');
}

/* ---------------- HOME ---------------- */
const ICONS = {

  part2: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 11.5h4.5M15.5 11.5H20M4 17h16"/><rect x="10" y="9.6" width="4" height="3.8" rx="1.2" stroke-dasharray="2.4 2"/></svg>',
  part3: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17.5L8 7l4 10.5M5.3 14h5.4"/><path d="M14.5 9.5H20m0 0l-2.2-2.2M20 9.5l-2.2 2.2"/><path d="M15.5 16.5c0 1.4 1.1 2 2.3 2s2.2-.6 2.2-2-1-2-2.2-2"/></svg>',
  part4: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8.5h13.5m0 0L14.6 5.6M17.5 8.5l-2.9 2.9"/><path d="M20 15.5H6.5m0 0l2.9-2.9M6.5 15.5l2.9 2.9"/></svg>',
  reading: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6.2C10 4.8 7.6 4.2 4 4.2v13.6c3.6 0 6 .6 8 2 2-1.4 4.4-2 8-2V4.2c-3.6 0-6 .6-8 2z"/><path d="M12 6.2v13.6"/></svg>',
  exam: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4L2.8 8.4 12 12.8l9.2-4.4L12 4z"/><path d="M6.2 10.8v4.6c0 1.5 11.6 1.5 11.6 0v-4.6"/><path d="M21.2 8.4v5.2"/></svg>'
};
const ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5l5 5L20 6.5"/></svg>';
const ICON_STACK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.5L3 8l9 4.5L21 8l-9-4.5z"/><path d="M3 12.5l9 4.5 9-4.5"/><path d="M3 17l9 4.5L21 17"/></svg>';
const ICON_LOOP = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 5v6h-6"/><path d="M4 19v-6h6"/><path d="M19.3 11A7.6 7.6 0 0 0 6 7.3L4 9.2M4.7 13A7.6 7.6 0 0 0 18 16.7l2-1.9"/></svg>';

function bestOf(s) { return s ? (s.best != null ? s.best : s.pct) : 0; }
/* Durchschnitt aller in der Kategorie absolvierten Einheiten. */
function avgOf(s) {
  if (!s) return 0;
  if (typeof s.sum === 'number' && s.attempts) return s.sum / s.attempts;
  if (Array.isArray(s.history) && s.history.length)
    return s.history.reduce((n, h) => n + h.p, 0) / s.history.length;
  return s.pct || 0;
}

function ringSvg(pct) {
  const R = 26, C = 2 * Math.PI * R;
  const off = C * (1 - Math.min(1, Math.max(0, pct)));
  const col = pct >= PASS_THRESHOLD ? 'var(--correct)' : 'var(--accent)';
  return `<svg class="ring" viewBox="0 0 64 64" role="img">
    <circle class="ring-bg" cx="32" cy="32" r="${R}"/>
    <circle class="ring-fg" cx="32" cy="32" r="${R}" style="stroke:${col};stroke-dasharray:${C.toFixed(1)};stroke-dashoffset:${off.toFixed(1)}"/>
    <text class="ring-num" x="32" y="32.5">${Math.round(pct * 100)}%</text>
    <text class="ring-cap" x="32" y="43">GESAMT</text>
  </svg>`;
}

function progressHtml(s, emptyLabel) {
  if (s) {
    const best = avgOf(s);
    const bp = Math.round(best * 100);
    const passed = best >= PASS_THRESHOLD;
    const cls = passed ? 'pass' : 'fail';
    return `
      <span class="card-progress">
        <span class="cp-bar"><span class="cp-fill ${cls}" style="width:${bp}%"></span><span class="cp-mark"></span></span>
        <span class="cp-labels"><span class="cp-pct ${cls}">${bp}%</span><span class="cp-status">${passed ? '✓ Bestanden' : 'Ziel: 60 %'}</span></span>
      </span>`;
  }
  return `
    <span class="card-progress">
      <span class="cp-bar"><span class="cp-fill none" style="width:0%"></span><span class="cp-mark"></span></span>
      <span class="cp-labels"><span class="cp-pct none">0%</span><span class="cp-status">${emptyLabel}</span></span>
    </span>`;
}

function categoryCard(c, scores, delay) {
  return `
    <button class="card card-in" style="animation-delay:${delay}ms" data-cat="${c.id}">
      <span class="card-icon">${ICONS[c.id] || escapeHtml(c.icon)}</span>
      <span class="card-main">
        <span class="card-meta">${escapeHtml(c.shortName)}</span>
        <span class="card-name">${escapeHtml(c.name)}</span>
        <span class="card-desc">${escapeHtml(c.description)}</span>
        ${progressHtml(scores[c.id], 'Noch nicht geübt')}
      </span>
      <span class="card-chevron">›</span>
    </button>`;
}

function renderHome() {
  const scores = loadScores();
  const useOfEnglish = DATA.categories.filter(c => c.id.startsWith('part'));
  const readingCats = DATA.categories.filter(c => c.type === 'reading');

  // Hero: Ring = Ø über ALLE absolvierten Einheiten (Summe aller Prozente / Anzahl Einheiten)
  const allIds = DATA.categories.map(c => c.id).concat(['exam']);
  let totSum = 0, attempts = 0;
  allIds.forEach(id => {
    const s = scores[id];
    if (!s || !s.attempts) return;
    totSum += (typeof s.sum === 'number') ? s.sum : avgOf(s) * s.attempts;
    attempts += s.attempts;
  });
  const avg = attempts ? totSum / attempts : 0;
  $('#hero-ring').innerHTML = ringSvg(avg);
  $('#hero-chips').innerHTML = attempts > 0
    ? `<span class="chip">${ICON_LOOP}<b>${attempts}</b>&nbsp;${attempts === 1 ? 'Session' : 'Sessions'} absolviert</span>`
    : '';

  let d = 0;
  const next = () => { d += 40; return d; };
  const sections = [];

  sections.push(`
    <div class="sec">
      <div class="sec-head"><span class="sec-title">Use of English</span><span class="sec-meta">Part 1–4</span></div>
      <div class="sec-grid">${useOfEnglish.map(c => categoryCard(c, scores, next())).join('')}</div>
    </div>`);

  if (readingCats.length) {
    sections.push(`
      <div class="sec">
        <div class="sec-head"><span class="sec-title">Reading</span><span class="sec-meta">Part 5 &amp; 7</span></div>
        <div class="sec-grid">${readingCats.map(c => categoryCard(c, scores, next())).join('')}</div>

          <span class="card-meta">Prüfung · alle Teile</span>
          <span class="card-name">Prüfungssimulation</span>
          <span class="card-desc">Kompletter Durchlauf: Part 1–4 plus Reading (Part 5 &amp; 7), mit Gesamtauswertung.</span>

  $('#cards').innerHTML = sections.join('');

    el.addEventListener('click', () => startQuiz(el.dataset.cat)));

/* ---------------- SETTINGS & VERLAUF ---------------- */
const ICON_TRASH = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13M10 11v6M14 11v6"/></svg>';

function lineChart(history, gid) {
  const W = 300, H = 96, padX = 10, padTop = 12, padBot = 16;
  const pts = history.map(h => Math.min(1, Math.max(0, h.p)));
  if (!pts.length) return `<div class="chart-empty">Noch keine Versuche — starte den Modus, um deinen Verlauf zu sehen.</div>`;
  const n = pts.length;
  const x = i => n === 1 ? W / 2 : padX + (W - 2 * padX) * (i / (n - 1));
  const y = v => padTop + (H - padTop - padBot) * (1 - v);
  const last = pts[n - 1];
  const col = last >= PASS_THRESHOLD ? 'var(--correct)' : 'var(--accent)';
  const yThresh = y(PASS_THRESHOLD);

  const linePts = pts.map((v, i) => `${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const area = `M ${x(0).toFixed(1)} ${(H - padBot).toFixed(1)} L ` +
    pts.map((v, i) => `${x(i).toFixed(1)} ${y(v).toFixed(1)}`).join(' L ') +
    ` L ${x(n - 1).toFixed(1)} ${(H - padBot).toFixed(1)} Z`;

  const dots = pts.map((v, i) => {
    const lastDot = i === n - 1;
    return `<circle class="${lastDot ? 'ch-dot-last' : 'ch-dot'}" cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="${lastDot ? 4.2 : 2.8}" fill="${lastDot ? col : 'var(--accent)'}"/>`;
  }).join('');

  const grid = [0.25, 0.5, 0.75, 1].map(g => `<line class="ch-grid" x1="${padX}" y1="${y(g).toFixed(1)}" x2="${W - padX}" y2="${y(g).toFixed(1)}"/>`).join('');

  return `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img">

      <stop offset="0" stop-color="${col}" stop-opacity="0.28"/>
      <stop offset="1" stop-color="${col}" stop-opacity="0"/>
    </linearGradient></defs>
    ${grid}
    <line class="ch-thresh" x1="${padX}" y1="${yThresh.toFixed(1)}" x2="${W - padX}" y2="${yThresh.toFixed(1)}"/>
    <text class="ch-thresh-lab" x="${W - padX}" y="${(yThresh - 3).toFixed(1)}" text-anchor="end">60 %</text>
    <path d="${area}" fill="url(#cg${gid})"/>
    <polyline class="ch-line" points="${linePts}" style="stroke:${col}"/>
    ${dots}
  </svg>`;
}

function renderSettings() {
  const scores = loadScores();
  const compact = loadCompact();
  const light = loadTheme() === 'light';
  const modes = DATA.categories.map(c => ({ id: c.id, name: c.name, short: c.shortName }))
    .concat([{ id: 'exam', name: 'Prüfungssimulation', short: 'Prüfung' }]);

  const charts = modes.map((m, i) => {
    const s = scores[m.id];
    const hist = s && Array.isArray(s.history) ? s.history : [];
    const last = hist.length ? hist[hist.length - 1].p : null;
    const statCls = last == null ? 'none' : (last >= PASS_THRESHOLD ? 'pass' : 'fail');
    const statTxt = last == null ? '—' : `${Math.round(last * 100)}%`;
    const sub = hist.length ? `${hist.length} ${hist.length === 1 ? 'Versuch' : 'Versuche'} · Bestwert ${Math.round(bestOf(s) * 100)}%` : 'Noch kein Versuch';
    return `<div class="chart-card">
      <div class="chart-top"><span class="chart-name">${escapeHtml(m.name)}</span><span class="chart-stat ${statCls}">${statTxt}</span></div>
      <div class="chart-sub">${sub}</div>
      ${lineChart(hist, i)}
    </div>`;
  }).join('');

  $('#settings-inner').innerHTML = `
    <div class="set-group">
      <div class="set-group-title">Darstellung</div>
      <div class="set-row">
        <div class="set-row-main">
          <div class="set-row-name">Heller Modus</div>
          <div class="set-row-desc">Helles Farbschema statt dunkel. Ohne Auswahl folgt die App deinem System.</div>
        </div>
        <button class="switch ${light ? 'on' : ''}" id="toggle-theme" role="switch" aria-checked="${light}" aria-label="Heller Modus"></button>
      </div>
      <div class="set-row">
        <div class="set-row-main">
          <div class="set-row-name">Kompaktes Design</div>
          <div class="set-row-desc">Modi enger und übersichtlicher als kompakte Kacheln anordnen.</div>
        </div>
        <button class="switch ${compact ? 'on' : ''}" id="toggle-compact" role="switch" aria-checked="${compact}" aria-label="Kompaktes Design"></button>
      </div>
    </div>

    <div class="set-group">
      <div class="set-group-title">Verlauf je Modus</div>
      <div class="charts">${charts}</div>
    </div>

    <div class="set-group">
      <div class="set-group-title">Daten</div>
      <button class="set-reset" id="do-reset">${ICON_TRASH} Fortschritt zurücksetzen</button>
    </div>`;

  $('#toggle-theme').addEventListener('click', () => {
    const on = loadTheme() !== 'light';
    saveTheme(on ? 'light' : 'dark');
    applyTheme();
    $('#toggle-theme').classList.toggle('on', on);
    $('#toggle-theme').setAttribute('aria-checked', String(on));
  });
  $('#toggle-compact').addEventListener('click', () => {
    const on = !loadCompact();
    saveCompact(on);
    applyCompact();
    $('#toggle-compact').classList.toggle('on', on);
    $('#toggle-compact').setAttribute('aria-checked', String(on));
  });
  $('#do-reset').addEventListener('click', () => openConfirm({
    title: 'Fortschritt zurücksetzen?',
    text: 'Alle gespeicherten Ergebnisse und Verläufe werden unwiderruflich gelöscht.',
    okLabel: 'Zurücksetzen', cancelLabel: 'Abbrechen',
    onOk: () => { resetScores(); renderSettings(); }
  }));
}

function openSettings() { renderSettings(); show('view-settings'); $('.settings-scroll').scrollTop = 0; }

/* ---------------- QUIZ ---------------- */
function startQuiz(catId) {
  buildSession(catId);
  show('view-quiz');
  renderQuiz();
}

function renderQuiz() {
  const c = session.cat, q = curQ(), total = session.questions.length;
  $('#q-cat').textContent = c.shortName;
  $('#q-name').textContent = c.name;
  $('#q-count').textContent = `${session.idx + 1}/${total}`;
  if (session.exam) {
    $('#q-cat').textContent = `Prüfung · Teil ${exam.idx + 1}/${exam.stages.length}`;
    $('#q-name').textContent = session.examLabel;
  }

  // Ticks
  $('#q-ticks').innerHTML = session.questions.map((_, i) =>
    `<span class="tick ${i < session.idx ? 'done' : i === session.idx ? 'cur' : ''}"></span>`).join('');

  // Passage-Pane (Parts 1–3) oder verstecken (Part 4)
  const pane = $('#passage-pane');
  if (session.passage) {
    pane.style.display = '';
    pane.classList.toggle('reading', session.cat.type === 'reading');
    $('#passage-title').textContent = session.passage.title;
    $('#passage-text').innerHTML = renderPassage(session.passage, q.num);
  } else {
    pane.style.display = 'none';
  }

  // Frage-Body
  $('#qbody-inner').innerHTML = renderQuestionBody(q);
  wireQuestionBody(q);

  // Nav
  $('#q-prev').textContent = session.idx === 0 ? '✕ Beenden' : '← Zurück';
  const next = $('#q-next');
  const lastQ = session.idx === total - 1;
  if (session.exam) {
    const lastStage = exam.idx === exam.stages.length - 1;
    next.textContent = lastQ ? (lastStage ? 'Auswerten ✓' : 'Nächster Teil →') : 'Weiter →';
  } else {
    next.textContent = lastQ ? 'Auswerten ✓' : 'Weiter →';
  }
  next.disabled = !hasAnswer(q);

  // Scroll: Lückentexte → Frage ins Bild; Reading → oben am Text starten
  if (session.passage) {
    requestAnimationFrame(() => {
      if (session.cat.type === 'reading') {
        $('#quiz-body').scrollTop = 0;
        $('#passage-pane').scrollTop = 0;
        return;
      }
      const active = $('#passage-text .gap.active');
      if (active) active.scrollIntoView({ block: 'center', behavior: 'smooth' });
      $('#quiz-body').scrollTop = $('#quiz-body').scrollHeight; // Frage ins Bild
    });
  }
}

function renderPassage(passage, activeNum) {
  // Text mit {N} → styled spans
  const parts = passage.text.split(/(\{\d+\})/g);
  return parts.map(part => {
    const m = part.match(/^\{(\d+)\}$/);
    if (!m) return escapeHtml(part).replace(/\n/g, '<br>');
    const num = parseInt(m[1], 10);
    const q = passage.questions.find(x => x.num === num);
    const ans = session.answers[num];
    let state = 'empty', label;
    if (num === activeNum) state = 'active';
    else if (q.type === 'mc' ? ans != null : (ans != null && String(ans).trim() !== '')) state = 'answered';

    if (state === 'answered') {
      label = q.type === 'mc' ? escapeHtml(q.options[ans]) : escapeHtml(String(ans).trim());
    } else if (q.type === 'word') {
      label = `${num} · ${escapeHtml(q.base)}`;
    } else {
      label = String(num);
    }
    return `<span class="gap ${state}">${label}</span>`;
  }).join('');
}

function renderQuestionBody(q) {
  const n = q.num;
  if (q.type === 'mc') {
    const opts = q.options.map((opt, i) => {
      const sel = session.answers[n] === i ? ' sel' : '';
      const letter = 'ABCD'[i];
      return `<button class="option${sel}" data-i="${i}">
        <span class="marker"></span><span class="lett">${letter}</span>
        <span class="txt">${escapeHtml(opt)}</span></button>`;
    }).join('');
    if (q.prompt) {
      const kind = session.passage && session.passage.kind === 'mm' ? 'Multiple Matching' : 'Multiple Choice';
      return `<div class="q-eyebrow">${escapeHtml(session.cat.shortName)} · ${kind}</div>
        <div class="q-prompt">${escapeHtml(q.prompt)}</div>
        <div class="options">${opts}</div>`;
    }
    return `<div class="q-eyebrow">${escapeHtml(session.cat.shortName)} · Multiple-Choice</div>
      <div class="q-prompt">Wähle das beste Wort für Lücke <b>(${n})</b>.</div>
      <div class="options">${opts}</div>`;
  }

  if (q.type === 'open') {
    const val = session.answers[n] != null ? escapeHtml(session.answers[n]) : '';
    return `<div class="q-eyebrow">${escapeHtml(session.cat.shortName)} · Open Cloze</div>
      <div class="q-prompt">Ein Wort für Lücke <b>(${n})</b>.</div>
      <div class="hint">Meist Präpositionen, Phrasal-Verb-Partikel oder Strukturwörter.</div>
      <input class="answer-input" id="ans" type="text" inputmode="text"
        autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
        placeholder="ein Wort…" value="${val}" />`;
  }

  if (q.type === 'word') {
    const val = session.answers[n] != null ? escapeHtml(session.answers[n]) : '';
    return `<div class="q-eyebrow">${escapeHtml(session.cat.shortName)} · Word Formation</div>
      <div class="q-prompt">Bilde die richtige Form für Lücke <b>(${n})</b>.</div>
      <div class="basework">
        <span class="base-tag">${escapeHtml(q.base)}</span>
        <span class="arrow">→</span>
      </div>
      <input class="answer-input" id="ans" type="text" inputmode="text"
        autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
        placeholder="umgeformtes Wort…" value="${val}" />`;
  }

  // transform
  const val = session.answers[n] != null ? escapeHtml(session.answers[n]) : '';
  const gapped = escapeHtml(q.gapped).replace(/_+/, '<span class="tgap-mark">⟨ 2–5 Wörter ⟩</span>');
  return `<div class="q-eyebrow">${escapeHtml(session.cat.shortName)} · Key Word Transformation</div>
    <div class="tblock">
      <div class="tline torig"><span class="tlabel">Original</span>${escapeHtml(q.original)}</div>
      <div><span class="tlabel">Schlüsselwort</span><span class="tkey">${escapeHtml(q.keyword)}</span></div>
      <div class="tline tgapped"><span class="tlabel">Vervollständige</span>${gapped}</div>
    </div>
    <input class="answer-input" id="ans" type="text" inputmode="text"
      autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
      placeholder="2–5 Wörter…" value="${val}" />`;
}

function wireQuestionBody(q) {
  if (q.type === 'mc') {
    $('#qbody-inner').querySelectorAll('.option').forEach(el => {
      el.addEventListener('click', () => {
        session.answers[q.num] = parseInt(el.dataset.i, 10);
        renderQuiz();
      });
    });
  } else {
    const inp = $('#ans');
    inp.addEventListener('input', () => {
      session.answers[q.num] = inp.value;
      $('#q-next').disabled = !hasAnswer(q);
      // Lücken-Status live aktualisieren (ohne Fokus zu verlieren)
      if (session.passage) $('#passage-text').innerHTML = renderPassage(session.passage, q.num);
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); if (hasAnswer(q)) goNext(); }
    });
    // Autofokus auf Desktop/Tablet (nicht auf Phone, um Tastatur-Sprung zu vermeiden)
    if (window.matchMedia('(min-width:600px)').matches) setTimeout(() => inp.focus(), 50);
  }
}

function goNext() {
  if (!hasAnswer(curQ())) return;
  if (session.idx < session.questions.length - 1) {
    session.idx++;
    renderQuiz();
  } else {
    finishQuiz();
  }
}
function goPrev() {
  if (session.idx === 0) { openModal('quit'); return; }
  session.idx--;
  renderQuiz();
}

/* ---------------- RESULTS ---------------- */
function gradeBand(pct) {
  if (pct >= 0.85) return { grade: 'A — Excellent', verdict: 'Sehr starkes Ergebnis. Du bewegst dich auf C1-Bestnote / C2-Niveau zu.' };
  if (pct >= 0.75) return { grade: 'B — Good Pass', verdict: 'Solides C1. Komfortabel über der Bestehensgrenze.' };
  if (pct >= 0.60) return { grade: 'C — Pass', verdict: 'Bestanden, aber knapp. Diese Kategorie noch ein paar Mal wiederholen.' };
  if (pct >= 0.50) return { grade: 'Knapp daneben', verdict: 'Sehr nah dran. Mit ein paar Wiederholungen sind die 60 % erreichbar.' };
  return { grade: 'Noch nicht', verdict: 'Empfehlung: das Thema systematisch durcharbeiten (z. B. mit Objective Advanced).' };
}

function finishQuiz() {
  if (session.exam) { advanceExam(); return; }
  const qs = session.questions;
  const correct = qs.filter(q => isCorrect(q, session.answers[q.num])).length;
  const total = qs.length;
  const pct = correct / total;
  const passed = pct >= PASS_THRESHOLD;
  saveScore(session.cat.id, pct, passed);
  renderResults(correct, total, pct, passed);
  show('view-results');
  $('.results-scroll').scrollTop = 0;
}

function renderResults(correct, total, pct, passed) {
  const c = session.cat;
  const pctRound = Math.round(pct * 100);
  const cls = passed ? 'pass' : 'fail';
  const { grade, verdict } = gradeBand(pct);
  $('#r-cat').textContent = `${c.shortName} · Auswertung`;
  $('#r-name').textContent = c.name;

  $('#res-hero-inner').innerHTML = `
    <div class="eyebrow">${escapeHtml(c.shortName)} · ${escapeHtml(c.name)}</div>
    <h2>Ergebnis</h2>
    <div class="score-box ${cls}">
      <span class="score-num">${correct}/${total}</span>
      <span class="score-pct">${pctRound}% · Schwelle 60%</span>
    </div>
    <div class="passbar-wrap">
      <div class="passbar">
        <div class="passbar-fill ${cls}" style="width:${pctRound}%"></div>
        <div class="passbar-mark"></div>
      </div>
      <div class="passbar-labels"><span>0%</span><span>60% Bestehen</span><span>100%</span></div>
    </div>
    <div class="grade-badge ${cls}">${passed ? '✓ Bestanden' : '✗ Nicht bestanden'} · ${escapeHtml(grade)}</div>
    <div class="verdict">${escapeHtml(verdict)}</div>`;

  $('#review-list').innerHTML = session.questions.map(q => reviewItem(q)).join('');
}

/* ---------------- Prüfungssimulation ---------------- */
let exam = null;
let examFinished = false;

function examPlan() {
  return [
    { catId: 'part1' }, { catId: 'part2' }, { catId: 'part3' },
    { catId: 'part4' },
    { catId: 'reading', kind: 'rc' }, { catId: 'reading', kind: 'mm' }
  ];
}
function buildExamStage(spec) {
  const c = cat(spec.catId);
  let passage = null, questions, label;
  if (c.type === 'transform') {
    questions = pickTransforms(c, c.sessionLength);
    label = `${c.shortName} · ${c.name}`;
  } else if (c.type === 'reading') {
    passage = pickPassage(c, spec.kind);
    questions = randomizeOptions(passage.questions, spec.kind === 'mm');
    label = spec.kind === 'mm' ? 'Reading · Multiple Matching' : 'Reading · Multiple Choice';
  } else {
    passage = pickPassage(c);
    questions = randomizeOptions(passage.questions, passage.kind === 'mm');
    label = `${c.shortName} · ${c.name}`;
  }
  session = { cat: c, passage, questions, answers: {}, idx: 0, exam: true, examLabel: label };
}
function startExam() {
  exam = { stages: examPlan(), idx: 0, results: [] };
  examFinished = false;
  buildExamStage(exam.stages[0]);
  show('view-quiz');
  renderQuiz();
}
function advanceExam() {
  const qs = session.questions;
  const correct = qs.filter(q => isCorrect(q, session.answers[q.num])).length;
  exam.results.push({ label: session.examLabel, questions: qs, answers: session.answers, correct, total: qs.length });
  exam.idx++;
  if (exam.idx < exam.stages.length) {
    buildExamStage(exam.stages[exam.idx]);
    renderQuiz();
    $('#quiz-body').scrollTop = 0;
  } else {
    renderExamResults();
  }
}
function renderExamResults() {
  examFinished = true;
  const totalCorrect = exam.results.reduce((n, r) => n + r.correct, 0);
  const totalQ = exam.results.reduce((n, r) => n + r.total, 0);
  const pct = totalCorrect / totalQ;
  const passed = pct >= PASS_THRESHOLD;
  const pctRound = Math.round(pct * 100);
  const cls = passed ? 'pass' : 'fail';
  const { grade, verdict } = gradeBand(pct);
  saveScore('exam', pct, passed);

  $('#r-cat').textContent = 'Prüfungssimulation · Auswertung';
  $('#r-name').textContent = 'Reading & Use of English';

  const breakdown = exam.results.map(r => {
    const rp = Math.round(r.correct / r.total * 100);
    const rcls = (r.correct / r.total) >= PASS_THRESHOLD ? 'pass' : 'fail';
    return `<div class="exam-row">
      <span class="exam-row-label">${escapeHtml(r.label)}</span>
      <span class="exam-row-bar"><span class="exam-row-fill ${rcls}" style="width:${rp}%"></span></span>
      <span class="exam-row-val ${rcls}">${r.correct}/${r.total}</span>
    </div>`;
  }).join('');

  $('#res-hero-inner').innerHTML = `
    <div class="eyebrow">Prüfungssimulation · Reading &amp; Use of English</div>
    <h2>Gesamtergebnis</h2>
    <div class="score-box ${cls}">
      <span class="score-num">${totalCorrect}/${totalQ}</span>
      <span class="score-pct">${pctRound}% · Schwelle 60%</span>
    </div>
    <div class="passbar-wrap">
      <div class="passbar"><div class="passbar-fill ${cls}" style="width:${pctRound}%"></div><div class="passbar-mark"></div></div>
      <div class="passbar-labels"><span>0%</span><span>60% Bestehen</span><span>100%</span></div>
    </div>
    <div class="grade-badge ${cls}">${passed ? '✓ Bestanden' : '✗ Nicht bestanden'} · ${escapeHtml(grade)}</div>
    <div class="verdict">${escapeHtml(verdict)}</div>
    <div class="exam-breakdown">${breakdown}</div>`;

  $('#review-list').innerHTML = exam.results.map(r =>
    `<div class="review-part">${escapeHtml(r.label)} · ${r.correct}/${r.total}</div>` +
    r.questions.map(q => reviewItem(q, r.answers)).join('')
  ).join('');

  show('view-results');
  $('.results-scroll').scrollTop = 0;
}

function reviewItem(q, answers) {
  const ans = (answers || session.answers)[q.num];
  const ok = isCorrect(q, ans);
  const where = q.type === 'transform'
    ? `Transformation (${q.num}) · ${escapeHtml(q.keyword)}`
    : q.prompt ? `Frage (${q.num})` : `Lücke (${q.num})`;

  let correctTxt, yourTxt;
  if (q.type === 'mc') {
    const _cs = Array.isArray(q.correct) ? q.correct : [q.correct];
    correctTxt = _cs.map(i => `${'ABCD'[i]} — ${escapeHtml(q.options[i])}`).join(' / ');
    yourTxt = ans != null ? `${'ABCD'[ans]} — ${escapeHtml(q.options[ans])}` : '—';
  } else {
    correctTxt = q.accept.map(escapeHtml).join(' / ');
    yourTxt = (ans != null && String(ans).trim() !== '') ? escapeHtml(String(ans).trim()) : '—';
  }

  const ansLine = ok
    ? `<div class="rev-ans"><span class="right">Richtig: ${correctTxt}</span></div>`
    : `<div class="rev-ans"><span class="you">Du: <s>${yourTxt}</s></span> &nbsp;·&nbsp; <span class="right">Richtig: ${correctTxt}</span></div>`;

  return `
    <div class="rev-item">
      <div class="rev-top">
        <span class="rev-num">${q.num}</span>
        <span class="rev-flag ${ok ? 'ok' : 'no'}">${ok ? '✓ Richtig' : '✗ Falsch'}</span>
      </div>
      <div class="rev-where">${where}</div>
      ${q.prompt ? `<div class="rev-prompt">${escapeHtml(q.prompt)}</div>` : ''}
      ${ansLine}
      <div class="rev-exp">${escapeHtml(q.explanation)}</div>
    </div>`;
}

/* ---------------- Modal ---------------- */
let modalAction = null;
let pendingConfirm = null;
function openModal(kind) {
  modalAction = kind; pendingConfirm = null;
  $('#modal-title').textContent = 'Test abbrechen?';
  $('#modal-text').textContent = 'Dein bisheriger Fortschritt in dieser Session geht verloren.';
  $('#modal-cancel').textContent = 'Weiter üben';
  $('#modal-ok').textContent = 'Abbrechen';
  $('#modal').classList.add('show');
}
function openConfirm(cfg) {
  modalAction = null; pendingConfirm = cfg.onOk || null;
  $('#modal-title').textContent = cfg.title;
  $('#modal-text').textContent = cfg.text;
  $('#modal-cancel').textContent = cfg.cancelLabel || 'Abbrechen';
  $('#modal-ok').textContent = cfg.okLabel || 'OK';
  $('#modal').classList.add('show');
}
function closeModal() { $('#modal').classList.remove('show'); modalAction = null; pendingConfirm = null; }

/* ---------------- Events ---------------- */
$('#q-next').addEventListener('click', goNext);
$('#q-prev').addEventListener('click', goPrev);
$('#q-close').addEventListener('click', () => openModal('quit'));

$('#open-settings').addEventListener('click', openSettings);
$('#set-close').addEventListener('click', () => { renderHome(); show('view-home'); });

$('#modal-cancel').addEventListener('click', closeModal);
$('#modal-ok').addEventListener('click', () => {
  if (pendingConfirm) { const cb = pendingConfirm; closeModal(); cb(); return; }
  closeModal();
  exam = null; examFinished = false;
  renderHome();
  show('view-home');
});

$('#r-home').addEventListener('click', () => { exam = null; examFinished = false; renderHome(); show('view-home'); });
$('#r-close').addEventListener('click', () => { exam = null; examFinished = false; renderHome(); show('view-home'); });
$('#r-retry').addEventListener('click', () => { if (examFinished) { startExam(); } else { startQuiz(session.cat.id); } });

/* Browser-Back abfangen, damit kein versehentliches Verlassen */
window.addEventListener('keydown', e => {
  if (e.key === 'Escape' && $('#modal').classList.contains('show')) closeModal();
});

/* ---------------- PWA: Service Worker + Installation ---------------- */
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  // Selbstheilung: wenn ein aktualisierter Service Worker übernimmt, einmal neu laden,
  // damit eine evtl. veraltete/leere gecachte Seite sofort durch frische Inhalte ersetzt wird.
  const hadController = !!navigator.serviceWorker.controller;
  let reloaded = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (reloaded || !hadController) return;
    reloaded = true;
    window.location.reload();
  });
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      if (reg && reg.update) { try { reg.update(); } catch (_) {} }
    }).catch(() => {});
  });
}

const installArea = $('#install-area');
const installBtn = $('#install-btn');
const installHint = $('#install-hint');
let deferredPrompt = null;

const isStandalone = () =>
  window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
const isiOS = () =>
  /iphone|ipad|ipod/i.test(navigator.userAgent) ||
  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (isStandalone()) return;
  installArea.hidden = false;
  installBtn.hidden = false;
  installHint.hidden = true;
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  installArea.hidden = true;
});

window.addEventListener('appinstalled', () => { installArea.hidden = true; });

// iOS/iPadOS Safari kennt kein beforeinstallprompt → Anleitung einblenden.
if (!isStandalone() && isiOS()) {
  installArea.hidden = false;
  installBtn.hidden = true;
  installHint.hidden = false;
  installHint.innerHTML =
    'Auf iPhone/iPad in <b>Safari</b>: unten das <b>Teilen-Symbol</b> antippen → ' +
    '<b>„Zum Home-Bildschirm“</b>. Danach startet der Trainer wie eine echte App – auch offline.';
}
if (isStandalone()) installArea.hidden = true;

/* ---------------- Init ---------------- */
applyTheme();
applyCompact();
renderHome();

</script>
